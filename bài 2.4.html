<html>
    <head>
       <meta charset="UTF-8">
        <title>Điện Máy NK</title>
        <link rel="icon" type="image/png" href="image/favicon_32x32.png">
    </head>
        <body>
            <h1>thông tin đang kí</h1>
<table border="2" cellspacing="0" cellpadding="10">
    <tr bgcolor="#ccffff">
        <th>Component</th>
        <th>Display</th>
    </tr>

    <tr>
        <td>Input text</td>
        <td>
            <input type="text">
        </td>
    </tr>

    <tr>
        <td>Textarea</td>
        <td>
            <textarea rows="8" cols="80"></textarea>
        </td>
    </tr>

    <tr>
        <td>Button</td>
        <td>
            <button>Click me</button>
        </td>
    </tr>

    <tr>
        <td>Radio</td>
        <td>
            <input type="radio" name="r" checked> Option 1 <br>
            <input type="radio" name="r"> Option 2 <br>
            <input type="radio" name="r"> Option 3
        </td>
    </tr>

    <tr>
        <td>Multiple selection</td>
        <td>
            <input type="checkbox"> Option 1 <br>
            <input type="checkbox" checked> Option 2 <br>
            <input type="checkbox"> Option 3
        </td>
    </tr>

    <tr>
        <td>Dropdown</td>
        <td>
            <select>
                <option>Volvo</option>
                <option>Toyota</option>
                <option>Honda</option>
                <option>BMW</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>File select</td>
        <td>
            <input type="file">
        </td>
    </tr>
</table>
        </body>
    
</html>

<html>
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive</title>
    <style>
    .bgElement {
    height: 500px;
    background-image: url("https://webcode.tools/img/ottawa.jpg") !important;
    background-position: center;
    background-size: cover;
    background-attachment: fixed;
}

.bgElement p {
    font-size: 80px;
    color: white;
    -webkit-text-stroke: 1px black; /* Độ dày và màu viền chữ */

    padding-top: 170px;
    text-align: center;
}
</style>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    
</head>
        <body>




    <h3>Bootstrap List Card</h3>

    <div class="container mt-4">
        <div class="row">

            <div class="card col-12 col-sm-6 col-md-4 col-lg-2" style="width:18rem;">

                <img src="https://picsum.photos/300/200?1"
                     class="card-img-top"
                     alt="mô tả ảnh">

                <div class="card-body">

                    <h5 class="card-title">Card title</h5>

                    <p class="card-text">
                        Some quick example text to build on the card title
                        and make up the bulk of the card's content.
                    </p>

                    <a href="#" class="btn btn-primary">
                        Go somewhere
                    </a>

                </div>

            </div>

        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>






            
<footer class="py-5 bg-dark">
    <div class="container px-4">
        <p class="text-center text-white">
            © 2026 Company, Inc
        </p>
    </div>
</footer>
        </body>
    
</html>
